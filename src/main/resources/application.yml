spring:
  application:
       name: AuthForge

  datasource:
     url: jdbc:postgresql://localhost:5432/authforge
     username: authforge
     password: authforge
     driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 9090
